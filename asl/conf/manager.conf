; ─────────────────────────────────────────────────────────
;  Asterisk Manager Interface (AMI)
;  Used by the API container to send node link/unlink commands.
;  AMI_SECRET is injected at container startup.
; ─────────────────────────────────────────────────────────

[general]
enabled           = yes
port              = 5038
bindaddr          = 0.0.0.0
displayconnects   = no
timestampevents   = yes

[webtx]
secret  = ${AMI_SECRET}
; Allow connections from localhost and Docker bridge networks
permit  = 127.0.0.1/255.255.255.255
permit  = 172.16.0.0/255.240.0.0
permit  = 10.0.0.0/255.0.0.0
read    = all
write   = all,command
