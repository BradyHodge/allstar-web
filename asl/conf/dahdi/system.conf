; ─────────────────────────────────────────────────────────
;  DAHDI system configuration
;  The dahdi_dummy kernel module (loaded by host-setup.sh)
;  provides a timing source without physical hardware.
;  The pseudo channel used by app_rpt is automatically
;  available once the dahdi kernel module is loaded.
; ─────────────────────────────────────────────────────────

; Tone zone for the US (does not affect hub node operation)
loadzone    = us
defaultzone = us
