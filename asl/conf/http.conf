; ─────────────────────────────────────────────────────────
;  Asterisk built-in HTTP server
;  Provides the WebSocket endpoint for PJSIP WebRTC clients.
;  TLS is terminated by Caddy upstream; Asterisk uses plain WS.
;
;  WebSocket path: ws://0.0.0.0:8088/ws
;  Via Caddy:     wss://DOMAIN/ws
; ─────────────────────────────────────────────────────────

[general]
enabled              = yes
bindaddr             = 0.0.0.0
bindport             = 8088
; No prefix - WebSocket is available at /ws (not /asterisk/ws)
; tlsenable = no (Caddy handles TLS)
tlsenable            = no
sessionlimit         = 100
session_inactivity   = 30000
session_keep_alive   = 15000
