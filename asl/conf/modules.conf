; ─────────────────────────────────────────────────────────
;  Asterisk modules configuration
; ─────────────────────────────────────────────────────────

[modules]
autoload = yes

; WebRTC requirements - explicitly ensure these are loaded
load => res_crypto.so
load => res_http_websocket.so
load => res_pjsip_transport_websocket.so
load => codec_opus.so

; Disable legacy chan_sip to avoid conflicts with chan_pjsip
noload => chan_sip.so

; Unnecessary modules for a headless hub node
noload => chan_skinny.so
noload => chan_mgcp.so
noload => chan_unistim.so
noload => chan_motif.so
