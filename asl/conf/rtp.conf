; ─────────────────────────────────────────────────────────
;  RTP configuration
;  STUN_SERVER is injected at container startup.
; ─────────────────────────────────────────────────────────

[general]
; RTP port range - open these ports in your VPS firewall
rtpstart = 10000
rtpend   = 20000

; ICE support for WebRTC NAT traversal
icesupport = yes

; STUN server for ICE candidate discovery.
; Asterisk uses this to learn its public IP for ICE candidates.
stunaddr = ${STUN_SERVER}
