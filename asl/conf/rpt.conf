; ─────────────────────────────────────────────────────────
;  app_rpt configuration - AllStar Web Transceiver Hub Node
;  NODE_NUMBER is substituted at container startup.
; ─────────────────────────────────────────────────────────

[general]
; Use both DNS lookup and local config for node resolution
node_lookup_method = both

; ── DTMF Function Maps ────────────────────────────────────

[functions]
; Standard radio-user DTMF functions
1  = ilink,1     ; Disconnect specific link
2  = ilink,2     ; Connect monitoring link
3  = ilink,3     ; Connect transceive link
4  = ilink,4     ; Enter command mode
99 = cop,6       ; PTT off

[link-functions]
1 = ilink,1
2 = ilink,2
3 = ilink,3
4 = ilink,4

[phone-functions]
; Functions available to phone/WebRTC users
1 = ilink,1
2 = ilink,2
3 = ilink,3
99 = cop,6

; ── Telemetry Sounds ──────────────────────────────────────

[telemetry]
ct1 = /var/lib/asterisk/sounds/rpt/clicks
ct2 = /var/lib/asterisk/sounds/rpt/blip
ct3 = /var/lib/asterisk/sounds/rpt/beep
ct4 = /var/lib/asterisk/sounds/rpt/blip
ct5 = /var/lib/asterisk/sounds/rpt/clicks
ct6 = /var/lib/asterisk/sounds/rpt/longbeep
ct7 = /var/lib/asterisk/sounds/rpt/longbeep
ct8 = /var/lib/asterisk/sounds/rpt/longbeep
ranger           = /var/lib/asterisk/sounds/rpt/ranger
remotemon        = /var/lib/asterisk/sounds/rpt/remotemon
remotetrx        = /var/lib/asterisk/sounds/rpt/remotetrx
cmdmode          = /var/lib/asterisk/sounds/rpt/cmdmode
functcomplete    = /var/lib/asterisk/sounds/rpt/functcomplete
nofuncs          = /var/lib/asterisk/sounds/rpt/nofuncs

[controlstates]
1 = normal

[scheduler]

[events]

; ── Node Definition ───────────────────────────────────────
; This is a hub/web-transceiver node with no radio hardware.
; DAHDI/pseudo provides a virtual audio channel.
; WebRTC browser clients connect via PJSIP in phone mode.

[${NODE_NUMBER}]
rxchannel      = DAHDI/pseudo
duplex         = 0
; No hang time for a phone transceiver (user controls PTT)
hangtime       = 0
althangtime    = 0
; Very long TX timeout (1 hour) - browser PTT controls transmission
totime         = 3600000
; Suppress tones and IDs for a clean web experience
holdofftelem   = 1
telemdefault   = 0
telemdynamic   = 0
; No ID (set idtime > 0 and idrecording if you want an ID)
idtime         = 0
politeid       = 30
; DTMF function maps
functions      = functions
link_functions = link-functions
phone_functions = phone-functions
telemetry      = telemetry
controlstates  = controlstates
scheduler      = scheduler
events         = events
; Audio gain adjustments (tweak if needed)
erxgain        = -3
etxgain        = 3
simplexphonedelay = 0
