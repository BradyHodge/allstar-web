; ─────────────────────────────────────────────────────────
;  app_rpt configuration - AllStar Web Transceiver
;  Per-user node sections are dynamically included from
;  /etc/asterisk/users/users_rpt.conf, which is written by
;  the API container when users register.
; ─────────────────────────────────────────────────────────

[general]
node_lookup_method = both

; ── DTMF Function Maps ────────────────────────────────────

[functions]
1  = ilink,1
2  = ilink,2
3  = ilink,3
4  = ilink,4
99 = cop,6

[link-functions]
1 = ilink,1
2 = ilink,2
3 = ilink,3
4 = ilink,4

[phone-functions]
1 = ilink,1
2 = ilink,2
3 = ilink,3
99 = cop,6

; ── Telemetry Sounds ──────────────────────────────────────

[telemetry]
ct1 = /var/lib/asterisk/sounds/rpt/clicks
ct2 = /var/lib/asterisk/sounds/rpt/blip
ct3 = /var/lib/asterisk/sounds/rpt/beep
ct4 = /var/lib/asterisk/sounds/rpt/blip
ct5 = /var/lib/asterisk/sounds/rpt/clicks
ct6 = /var/lib/asterisk/sounds/rpt/longbeep
ct7 = /var/lib/asterisk/sounds/rpt/longbeep
ct8 = /var/lib/asterisk/sounds/rpt/longbeep
ranger        = /var/lib/asterisk/sounds/rpt/ranger
remotemon     = /var/lib/asterisk/sounds/rpt/remotemon
remotetrx     = /var/lib/asterisk/sounds/rpt/remotetrx
cmdmode       = /var/lib/asterisk/sounds/rpt/cmdmode
functcomplete = /var/lib/asterisk/sounds/rpt/functcomplete
nofuncs       = /var/lib/asterisk/sounds/rpt/nofuncs

[controlstates]
1 = normal

[scheduler]

[events]

; ── Per-user node sections ────────────────────────────────
; Written by the API when users register their AllStar nodes.
; Uses #tryinclude so Asterisk starts cleanly with no users yet.
#tryinclude /etc/asterisk/users/users_rpt.conf
