; ─────────────────────────────────────────────────────────
;  Asterisk dialplan for AllStar Web Transceiver
;  NODE_NUMBER is injected at container startup.
; ─────────────────────────────────────────────────────────

[general]
static       = yes
writeprotect = no

[globals]
; NODE_NUMBER is set by envsubst at startup
NODE = ${NODE_NUMBER}

; ── AllStar Node-to-Node IAX2 Connections ─────────────────
; Incoming connections from other AllStar nodes on the network.

[radio-secure]
exten => _X.,1,Verbose(1,Incoming IAX2 from node ${CALLERID(number)} to ${EXTEN})
 same => n,Rpt(${EXTEN})
 same => n,Hangup()

[radio]
exten => _X.,1,Verbose(1,Incoming IAX2 from ${CALLERID(number)} to ${EXTEN})
 same => n,Rpt(${EXTEN})
 same => n,Hangup()

; ── WebRTC / SIP Phone Connections ────────────────────────
; Browser dials NODE_NUMBER to join as a phone-mode participant.
; |P flag = "phone mode": full-duplex, user controls PTT via mic mute.

[sip-phones]
; Primary: browser dials the node number directly
exten => ${NODE_NUMBER},1,Verbose(1,WebRTC client joining node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

; Fallback pattern: any 4-6 digit number (for dialing other nodes directly)
; The browser can dial a remote AllStar node number directly;
; app_rpt will connect to that node in phone mode.
exten => _[2-9]XXXX,1,Verbose(1,WebRTC client dialing node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

exten => _[2-9]XXXXX,1,Verbose(1,WebRTC client dialing 6-digit node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

exten => h,1,Verbose(1,WebRTC client disconnected)

; ── AllStar System ─────────────────────────────────────────

[allstar-sys]
exten => _X.,1,Rpt(${EXTEN:0}|Rrpt/node:NODE:rpt/in-call:digits/0:PARKED,120)
 same => n,Hangup()
