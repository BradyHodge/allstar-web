; ─────────────────────────────────────────────────────────
;  Asterisk dialplan for AllStar Web Transceiver
;  Handles any user's node number - no hardcoded values.
; ─────────────────────────────────────────────────────────

[general]
static       = yes
writeprotect = no

; ── AllStar Node-to-Node IAX2 Connections ─────────────────

[radio-secure]
exten => _X.,1,Verbose(1,Incoming IAX2 from node ${CALLERID(number)} to ${EXTEN})
 same => n,Rpt(${EXTEN})
 same => n,Hangup()

[radio]
exten => _X.,1,Verbose(1,Incoming IAX2 from ${CALLERID(number)} to ${EXTEN})
 same => n,Rpt(${EXTEN})
 same => n,Hangup()

; ── WebRTC / SIP Phone Connections ────────────────────────
; Browser dials their own AllStar node number to go live.
; Also handles dialing remote nodes directly.
; |P flag = phone mode: full-duplex, PTT via mic mute in browser.

[sip-phones]
; 4-digit nodes (rare but possible)
exten => _XXXX,1,Verbose(1,WebRTC connecting to node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

; 5-digit nodes (most common AllStar range)
exten => _XXXXX,1,Verbose(1,WebRTC connecting to node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

; 6-digit nodes
exten => _XXXXXX,1,Verbose(1,WebRTC connecting to node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

; 7-digit nodes
exten => _XXXXXXX,1,Verbose(1,WebRTC connecting to node ${EXTEN})
 same => n,Ringing()
 same => n,Answer(500)
 same => n,Rpt(${EXTEN}|P)
 same => n,Hangup()

exten => h,1,Verbose(1,WebRTC client disconnected)

; ── AllStar System ─────────────────────────────────────────

[allstar-sys]
exten => _X.,1,Rpt(${EXTEN:0}|Rrpt/node:NODE:rpt/in-call:digits/0:PARKED,120)
 same => n,Hangup()
