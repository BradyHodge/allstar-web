; ─────────────────────────────────────────────────────────
;  PJSIP configuration for WebRTC browser clients
;  Per-user endpoints are dynamically included from
;  /etc/asterisk/users/users_pjsip.conf, written by the API.
; ─────────────────────────────────────────────────────────

; ── Transports ────────────────────────────────────────────

[transport-ws]
; WebSocket transport for browser WebRTC.
; TLS is terminated by Caddy upstream; plain WS here.
type     = transport
protocol = ws
bind     = 0.0.0.0

[transport-udp]
; UDP for traditional SIP clients
type     = transport
protocol = udp
bind     = 0.0.0.0:5060

; ── Per-user WebRTC endpoints ─────────────────────────────
; Each user gets a [node_NNNNN] endpoint with their own
; SIP password, written when they register via the web UI.
#tryinclude /etc/asterisk/users/users_pjsip.conf
