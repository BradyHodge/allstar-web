; ─────────────────────────────────────────────────────────
;  PJSIP configuration for WebRTC browser clients
;  SIP_PASSWORD is injected at container startup.
;
;  Browsers connect via JsSIP over WSS (TLS terminated by Caddy)
;  which is proxied to Asterisk's plain WS on port 8088.
; ─────────────────────────────────────────────────────────

; ── Transports ────────────────────────────────────────────

[transport-ws]
; WebSocket transport - hooks into Asterisk's HTTP server (http.conf)
; Port is taken from http.conf (8088), not specified here.
; TLS is handled upstream by Caddy, so plain WS here is correct.
type     = transport
protocol = ws
bind     = 0.0.0.0

[transport-udp]
; UDP for traditional SIP clients (e.g. Zoiper, Linphone)
type     = transport
protocol = udp
bind     = 0.0.0.0:5060

; ── WebRTC Endpoint ───────────────────────────────────────
; Browser connects as SIP user "webtx" via JsSIP.
; webrtc=yes is Asterisk shorthand that enables:
;   use_avpf, media_encryption=dtls, ice_support=yes,
;   rtcp_mux=yes, use_received_transport=yes

[webtx]
type                   = endpoint
transport              = transport-ws
context                = sip-phones
disallow               = all
allow                  = ulaw
allow                  = opus
webrtc                 = yes
; Auto-generate a self-signed DTLS cert for media encryption.
; This is for SRTP only - the WSS cert is handled by Caddy.
dtls_auto_generate_cert = yes
ice_support            = yes
rewrite_contact        = yes
rtp_symmetric          = yes
direct_media           = no
force_rport            = yes
auth                   = webtx
aors                   = webtx
callerid               = "Web Transceiver" <${NODE_NUMBER}>
dtmf_mode              = rfc4733

[webtx]
type      = auth
auth_type = userpass
username  = webtx
password  = ${SIP_PASSWORD}

[webtx]
type              = aor
max_contacts      = 10
remove_existing   = no
qualify_frequency = 30
