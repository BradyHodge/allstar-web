; ─────────────────────────────────────────────────────────
;  IAX2 configuration for AllStar network connectivity
; ─────────────────────────────────────────────────────────

[general]
bindport    = 4569
bindaddr    = 0.0.0.0
disallow    = all
allow       = ulaw
allow       = adpcm
allow       = gsm
; No jitter buffer - AllStar is VoIP linking, not PSTN
jitterbuffer      = no
forcejitterbuffer = no
authdebug         = no
; Call tokens improve security but some old nodes don't support them
requirecalltoken  = auto
delayreject       = yes

; ── AllStar Incoming Node Connections ─────────────────────

[radio]
; Authenticated RSA connections from AllStar-registered nodes
type    = user
context = radio-secure
auth    = rsa
setvar  = NODENUM=${CALLERID(number)}
requirecalltoken = auto
disallow = all
allow    = ulaw
allow    = adpcm
allow    = gsm

[allstar-public]
; Legacy/public connections from AllStar nodes (MD5 auth)
type    = user
context = radio-secure
auth    = md5
secret  = allstar
requirecalltoken = no
disallow = all
allow    = ulaw
allow    = adpcm
allow    = gsm
