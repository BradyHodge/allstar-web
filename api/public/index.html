<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllStar Web Transceiver</title>
  <script src="https://unpkg.com/jssip@3.10.0/dist/jssip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #3fb950;
      --red:      #f85149;
      --amber:    #d29922;
      --blue:     #58a6ff;
      --ptt-idle: #21262d;
      --ptt-tx:   #b91c1c;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .node-badge {
      font-family: monospace;
      font-size: 0.85rem;
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      color: var(--blue);
    }
    .spacer { flex: 1; }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.registered  { background: var(--green); }
    .status-dot.connected   { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
    .status-dot.error       { background: var(--red); }
    #status-text {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto;
      gap: 16px;
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── PTT section ── */
    .ptt-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Big connect/disconnect audio button */
    #btn-audio {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #btn-audio:hover:not(:disabled) { background: #2d333b; border-color: var(--blue); }
    #btn-audio.connected { border-color: var(--blue); color: var(--blue); }
    #btn-audio:disabled  { opacity: 0.4; cursor: default; }

    /* PTT button */
    #btn-ptt {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--ptt-idle);
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.1s, border-color 0.1s, color 0.1s, box-shadow 0.1s;
    }
    #btn-ptt:disabled {
      opacity: 0.3;
      cursor: default;
    }
    #btn-ptt.transmitting {
      background: var(--ptt-tx);
      border-color: #ef4444;
      color: #fff;
      box-shadow: 0 0 24px rgba(239, 68, 68, 0.5);
    }

    #ptt-label {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
      text-align: center;
    }
    #ptt-label.tx { color: var(--red); font-weight: 600; }

    /* Volume meter */
    .meter-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meter-label {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .meter-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.05s;
    }
    #rx-fill { background: var(--blue); }

    /* ── Side panel ── */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Node connect form */
    .form-row {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.9rem;
      font-family: monospace;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--blue);
    }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: #2d333b; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-connect { border-color: var(--green); color: var(--green); }
    .btn-connect:hover:not(:disabled) { background: rgba(63, 185, 80, 0.1); }
    .btn-disconnect { border-color: var(--red); color: var(--red); }
    .btn-disconnect:hover:not(:disabled) { background: rgba(248, 81, 73, 0.1); }

    /* Linked nodes list */
    #linked-nodes {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 48px;
    }
    .node-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: var(--bg);
      border-radius: 4px;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .node-item .node-number { color: var(--blue); }
    .node-item .btn-unlink {
      font-size: 0.7rem;
      padding: 2px 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      cursor: pointer;
    }
    .node-item .btn-unlink:hover { border-color: var(--red); color: var(--red); }

    /* Log */
    #log {
      font-family: monospace;
      font-size: 0.72rem;
      color: var(--muted);
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.6;
      word-break: break-word;
    }
    #log .entry { border-bottom: 1px solid #21262d; padding: 2px 0; }
    #log .entry.warn  { color: var(--amber); }
    #log .entry.error { color: var(--red); }
    #log .entry.ok    { color: var(--green); }

    /* Hidden audio element for remote audio playback */
    audio { display: none; }
  </style>
</head>
<body>

<header>
  <h1>AllStar Web Transceiver</h1>
  <span class="node-badge" id="node-badge">Node —</span>
  <span class="spacer"></span>
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Initialising…</span>
</header>

<main>
  <!-- Left: PTT Panel -->
  <div class="panel ptt-section">
    <div class="panel-title">Transceiver</div>

    <button id="btn-audio" disabled>Connect Audio</button>

    <button id="btn-ptt" disabled>PTT</button>
    <div id="ptt-label">Connect audio to enable</div>

    <div class="meter-wrap">
      <div class="meter-label"><span>TX (mic)</span><span id="tx-db">—</span></div>
      <div class="meter-bar"><div class="meter-fill" id="tx-fill"></div></div>
    </div>
    <div class="meter-wrap">
      <div class="meter-label"><span>RX (node)</span><span id="rx-db">—</span></div>
      <div class="meter-bar"><div class="meter-fill" id="rx-fill"></div></div>
    </div>
  </div>

  <!-- Right: Controls + Log -->
  <div class="side-panel">

    <!-- Node connect -->
    <div class="panel">
      <div class="panel-title">Link Node</div>
      <div class="form-row">
        <input type="text" id="target-node" placeholder="Node number…" maxlength="7" inputmode="numeric">
        <button class="btn btn-connect" id="btn-link">Link</button>
        <button class="btn btn-disconnect" id="btn-unlink">Unlink</button>
      </div>
      <div style="margin-top:10px;">
        <button class="btn btn-disconnect" id="btn-unlink-all" style="font-size:0.75rem;padding:5px 10px;">
          Unlink All
        </button>
        <button class="btn" id="btn-refresh-status" style="font-size:0.75rem;padding:5px 10px;margin-left:6px;">
          Refresh Status
        </button>
      </div>

      <div style="margin-top:14px;">
        <div class="panel-title" style="margin-bottom:8px;">Linked Nodes</div>
        <div id="linked-nodes">No links active</div>
      </div>
    </div>

    <!-- Log -->
    <div class="panel" style="flex:1">
      <div class="panel-title">Activity Log</div>
      <div id="log"></div>
    </div>

  </div>
</main>

<!-- Hidden audio for incoming node audio -->
<audio id="remote-audio" autoplay></audio>

<script src="app.js"></script>
</body>
</html>
