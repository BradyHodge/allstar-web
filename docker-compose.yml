version: "3.9"

services:
  asl:
    build: ./asl
    container_name: allstar-asl
    network_mode: host
    privileged: true
    volumes:
      - ./asl/conf:/etc/asterisk-templates:ro
      - asl-etc:/etc/asterisk
      # Shared volume: API writes user configs here, Asterisk reads them
      - asterisk-users:/etc/asterisk/users
      - asl-spool:/var/spool/asterisk
      - asl-log:/var/log/asterisk
    environment:
      - AMI_SECRET=${AMI_SECRET:-changeme-ami}
      - STUN_SERVER=${STUN_SERVER:-stun.l.google.com:19302}
    restart: unless-stopped

  api:
    build: ./api
    container_name: allstar-api
    networks:
      - internal
    environment:
      - AMI_HOST=host.docker.internal
      - AMI_PORT=5038
      - AMI_USER=webtx
      - AMI_SECRET=${AMI_SECRET:-changeme-ami}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme-must-be-32-chars-exactly}
      - SIP_DOMAIN=${DOMAIN}
      - STUN_SERVER=${STUN_SERVER:-stun.l.google.com:19302}
      - ASTERISK_USERS_DIR=/etc/asterisk-users
      - DB_PATH=/app/data/users.db
    volumes:
      # Same shared volume: API writes here
      - asterisk-users:/etc/asterisk-users
      # SQLite database persistence
      - api-db:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - asl
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: allstar-caddy
    networks:
      - internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  asl-etc:
  asterisk-users:   # shared between asl and api
  asl-spool:
  asl-log:
  api-db:
  caddy-data:
  caddy-config:
